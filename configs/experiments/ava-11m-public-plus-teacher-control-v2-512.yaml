name: ava-11m-public-plus-teacher-control-v2-512
tokenizer:
  kind: byte
  vocab_size: 260

model:
  block_size: 512
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.0
  bias: false
  architecture: transformer
  loop_repeats: 1

training:
  device: cuda
  dtype: float32
  micro_batch_size: 2
  gradient_accumulation_steps: 2
  learning_rate: 0.000002
  weight_decay: 0.01
  max_steps: 64
  warmup_steps: 8
  grad_clip: 1.0
  loss_mode: supervised
  init_checkpoint: sessions/2026-03-14-184859-failure-patch-v2-rerun-11m-96/checkpoints/ava-11m-failure-patch-v2.pt

memory:
  enabled: true
  max_items: 256
  write_surprise_threshold: 0.45
  top_k: 4

tools:
  calculator: true
  prompt_protocol: compact_tags
