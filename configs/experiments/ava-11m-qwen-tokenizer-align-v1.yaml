name: ava-11m-qwen-tokenizer-align-v1
tokenizer:
  kind: hf_auto
  path: artifacts/tokenizers/qwen2.5-0.5b-hf-auto.json

model:
  block_size: 256
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.0
  bias: false
  architecture: transformer
  loop_repeats: 1

training:
  device: cuda
  dtype: float32
  micro_batch_size: 4
  gradient_accumulation_steps: 2
  learning_rate: 0.00005
  weight_decay: 0.01
  max_steps: 128
  warmup_steps: 8
  grad_clip: 1.0
  loss_mode: supervised
  init_checkpoint: sessions/2026-03-14-184859-failure-patch-v2-rerun-11m-96/checkpoints/ava-11m-failure-patch-v2.pt
  trainable_patterns:
    - wte.weight
    - ln_f

memory:
  enabled: true
  max_items: 256
  write_surprise_threshold: 0.45
  top_k: 4

tools:
  calculator: true
  prompt_protocol: compact_tags
