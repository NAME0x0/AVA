name: ava-11m-general-sft-v3-lr1e4
tokenizer:
  kind: byte
  vocab_size: 260

model:
  block_size: 128
  n_layer: 6
  n_head: 6
  n_embd: 384
  dropout: 0.0
  bias: false

training:
  device: cuda
  dtype: float32
  micro_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 0.0001
  weight_decay: 0.01
  max_steps: 256
  warmup_steps: 12
  grad_clip: 1.0
  loss_mode: supervised

memory:
  enabled: true
  max_items: 256
  write_surprise_threshold: 0.45
  top_k: 4

tools:
  calculator: true
  prompt_protocol: compact_tags
