# AVA v3.0 SFT run config — single source of truth for the C5 lane.
# Consumed by train/sft.py::SFTConfig.from_yaml. Reproducible from this file
# + git hash + seed alone (RECIPE reproducibility invariants).

phase: C5
ckpt_repo: NAME0x0/AVA-v3-checkpoints
donor: Qwen/Qwen3.5-4B
seed: 1234

# -- data ---------------------------------------------------------------
# NOTE: seq_len / grad_accum / shard_minutes / sync_minutes below are
# BASELINES — with auto_hardware (default true) train/hw_profile.py detects
# the GPU (T4/L4/A100/V100/A2000/CPU) and overrides them + picks fp16/bf16.
# Set auto_hardware: false to force these values.
seq_len: 1024                    # laptop: drop to 640; Kaggle/Colab T4: 1024
sources:
  - name: opencodereasoning      # reasoning-trace backbone (Apache 2.0)
    hf_id: nvidia/OpenCodeReasoning
    config: split_0              # verified: configs [split_0, split_1]
    split: split_0               # verified: split inside config is also split_0
    weight: 0.7
    fim_fraction: 0.15           # auto-disabled if tokenizer lacks FIM sentinels
  - name: commitpackft           # edit skill -> hashline dialect (REVIEW section 11.3)
    hf_id: bigcode/commitpackft  # legacy script dataset -> direct-file load:
    data_files: hf://datasets/bigcode/commitpackft/data/python/data.jsonl
    split: train                 # (python first; more languages join at the
    weight: 0.3                  #  MultiPL-E stage — one data_files line each)
    fim_fraction: 0.0
# STAGED (PLAN_2026-07-15_v31 s3) — clean agentic/reasoning upgrade. NOT active
# until each schema is confirmed with scripts/inspect_dataset.py and a mapper is
# added to train/data.py SCHEMA_MAPPERS (rule: never map a guessed schema):
#   - nvidia/Open-SWE-Traces   (207K agentic trajectories, CC BY 4.0) -> agentic
#   - nvidia/OpenMathReasoning (reasoning muscle, CC BY 4.0)
#   - open-thoughts/OpenThoughts-114k (open reasoning CoT)
# Proprietary-distill sets (Claude/GPT traces) are BANNED — s2.
decontam_against:                # R21 floor; full MinHash gate is v3-full work
  - evalplus/humanevalplus
  - evalplus/mbppplus

# -- optimization --------------------------------------------------------
lr: 1.0e-4
micro_batch: 1
grad_accum: 16                   # laptop: 32
total_steps: 20000
warmup_steps: 100
max_grad_norm: 1.0

# -- lora ----------------------------------------------------------------
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
use_dora: true                   # DoRA > plain LoRA at same param count (v31 s4)

# -- fabric ---------------------------------------------------------------
shard_minutes: 150               # kaggle batch: 550; laptop: 600
sync_minutes: 30
log_every: 20
dry_run: false
