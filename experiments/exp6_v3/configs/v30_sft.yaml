# AVA v3.0 SFT run config — single source of truth for the C5 lane.
# Consumed by train/sft.py::SFTConfig.from_yaml. Reproducible from this file
# + git hash + seed alone (RECIPE reproducibility invariants).

phase: C5E                       # whole-file EDIT run, FRESH from donor (C5 diff-run
                                 # step-3044 abandoned — wrong output format). In the
                                 # notebook set AVA_PHASE=C5E so autopilot starts fresh.
ckpt_repo: NAME0x0/AVA-v3-checkpoints
donor: Qwen/Qwen3.5-4B
seed: 1234

# -- data ---------------------------------------------------------------
# NOTE: seq_len / grad_accum / shard_minutes / sync_minutes below are
# BASELINES — with auto_hardware (default true) train/hw_profile.py detects
# the GPU (T4/L4/A100/V100/A2000/CPU) and overrides them + picks fp16/bf16.
# Set auto_hardware: false to force these values.
seq_len: 2048                    # laptop: 640; single T4: 1024; T4x2: 2048 (auto)
# WHOLE-FILE FORMAT FIX (2026-07-23): the -11.5pp @2167 and -17.3pp @3044
# regressions traced to an OUTPUT-FORMAT mismatch — we trained DIFF output
# (commitpackft->hashline, openswe->unified-diff) but CanItEdit + every strong
# open editor + the proven EditCoder recipe use WHOLE-FILE output. Diff training
# taught a minimality prior -> the model under-edits on substantial changes.
# Fix: EditPackFT (the benchmark authors' own whole-file set, MIT, filtered from
# CommitPackFT) becomes the edit backbone; diff sources DROPPED. Light reasoning
# retained. map_editpackft mirrors canitedit_eval._build_prompt EXACTLY (train==eval).
sources:
  - name: editpackft             # WHOLE-FILE instruction edits — proven CanItEdit
    hf_id: nuprl/EditPackFT       # recipe (EditCoder). MIT; ex-CommitPackFT, reformatted.
    split: train
    weight: 0.75                  # the backbone now — train the format the eval wants
    fim_fraction: 0.0
  - name: opencodereasoning      # light reasoning retention (Apache 2.0)
    hf_id: nvidia/OpenCodeReasoning
    config: split_0              # verified: configs [split_0, split_1]
    split: split_0
    weight: 0.25                 # kept low — reasoning-heavy caused the @2167 drift
    fim_fraction: 0.15           # auto-disabled if tokenizer lacks FIM sentinels
# DROPPED for the whole-file objective (they train DIFF output, which regressed us):
#   - bigcode/commitpackft via hashline dialect  (map_commitpackft)
#   - nvidia/Open-SWE-Traces  unified-diff patches (map_openswe)
# Both mappers stay in train/data.py for a future diff-format / agentic lane.
# STAGED (not active until schema-confirmed): OpenMathReasoning, OpenThoughts-114k.
# Proprietary-distill sets (Claude/GPT traces) are BANNED.
decontam_against:                # R21 floor; full MinHash gate is v3-full work
  - evalplus/humanevalplus
  - evalplus/mbppplus

# -- optimization --------------------------------------------------------
lr: 1.0e-4
micro_batch: 1
grad_accum: 16                   # laptop: 32
total_steps: 20000
warmup_steps: 100
max_grad_norm: 1.0

# -- lora ----------------------------------------------------------------
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
use_dora: false                  # plain LoRA — isolate the format fix as the single
                                 # variable vs prior runs; try DoRA once this is proven.

# -- fabric ---------------------------------------------------------------
shard_minutes: 150               # kaggle batch: 550; laptop: 600
sync_minutes: 30
log_every: 20
dry_run: false
