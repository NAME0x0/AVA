# AVA v3 student architecture spec — authoritative shape.
# Mirrors docs/v3/ARCHITECTURE_V3.md (June 2026 revision).
# Consumed by experiments/exp6_v3/engine/student_model.py.

name: ava-v3-3b-hrm-mote
total_params_target_b: 3.26
packed_size_target_gb: 1.70          # TQ1_0 build, Q8_0 embeddings
resident_target_gb_32k: 3.3

vocab_size: 248320                   # Qwen 3.6 tokenizer
hidden_size: 1792
num_hidden_layers: 24
tie_word_embeddings: true

rope_theta: 1000000
rope_scaling:
  type: yarn
  factor: 8.0                        # 32K native -> 256K
  original_max_position_embeddings: 32768

# Hybrid stack: 3x L-block (Mamba-3) + 1x H-block (gated softmax attention).
# 24 layers / 4 = 6 repeats -> 18 L-blocks, 6 H-blocks.
attention_layout:
  pattern: [L, L, L, H]
  repeats: 6

h_block:                             # softmax attention, RoPE applied here only
  num_q_heads: 14
  num_kv_heads: 4                    # GQA
  head_dim: 128
  use_rope: true
  gated: true                        # output gating (Qwen 3.6 style)

l_block:                             # subquadratic, no RoPE
  sublayer: mamba3                   # config-flip fallback: gated_deltanet (R2)
  num_heads: 14
  head_dim: 128
  state_size: 64                     # half of Mamba-2's 128 (MIMO result)
  complex_state: true                # Mamba-3 complex-valued update
  kernel: fla                        # fla.layers.mamba3; "reference" = pure-PyTorch oracle

# HRM-style recurrence (June 2026 revision — refinement-first design).
# See docs/v3/HRM_TEXT.md section 1b for D1-D4 rationale.
hrm:
  enabled: true
  max_l_steps: 6
  mean_l_steps_target: 2.5
  halting:
    type: act_ponder                 # ACT ponder loss, not Q-learning
    ponder_loss_weight: 0.05
    convergence_aware: true          # D2: head input = [z_L ; z_H ; ||z_L - z_prev||]
  deep_supervision:                  # D1: train the refinement loop directly
    supervised_steps: [2, 4, 6]
    step_loss_weights: [0.2, 0.3, 0.5]
    detach_between_segments: true    # 1-step gradient, O(1) memory
  latent_restart:                    # D3: inference-only fixed-point escape
    enabled_in_adaptive_mode: true
    confidence_threshold: 0.35
    perturbation_std: 0.02
    max_restarts: 1

moe:
  num_routed_experts: 32
  num_shared_experts: 1
  top_k: 4
  intermediate_size_routed: 768
  intermediate_size_shared: 4096
  expert_activation: relu_squared   # 2-matrix experts (up + down, ReLU^2) — BitNet b1.58 2B4T
                                    # precedent; matches the 3.26B param budget in
                                    # docs/v3/ARCHITECTURE_V3.md (32 x 2 x 1792 x 768)
  router_dtype: bfloat16
  routed_expert_quant: ternary       # {-1, 0, +1}, group-256 scales (QAT)
  shared_expert_quant: ternary       # group-256 (June 2026: was BF16 plan, then TQ)
  load_balance: bias-based           # DeepSeek-V3 style, no aux loss

quantization:
  ternary_group_size: 256            # matches upstream llama.cpp TQ1_0/TQ2_0 blocks
  export_formats: [TQ1_0, TQ2_0]     # stock llama.cpp; no fork dependency
  router: bf16
  attention: bf16
  mamba3: bf16
  embedding_train: bf16
  embedding_export: q8_0
  lm_head: tied
  kv_cache: turboquant_k4_v2

# Edge portfolio (docs/v3/EDGES.md) — June 2026.

memory_layer:                        # E1: RAM-tier product-key memory
  enabled: true
  num_keys: 1024                     # slots = num_keys^2 ~ 1.05M
  key_dim: 256
  topk: 32
  num_heads: 2
  mount_units: [1, 4]                # shared pool, residual branch on these units
  residency: system_ram              # value table never enters VRAM
  lr_multiplier: 10.0                # memory params train hot (Meta 2412.09764)
  growth_path_slots: 16777216        # 16M-slot SSD "capacity pack" (v3.x)

latent_curriculum:                   # E2: Coconut-style CoT internalization (P4b)
  enabled: true
  schedule: progressive              # replace j leading CoT sentences with j L-steps
  gate_ablation: A9                  # adopt iff >= +3pp MATH-500 at equal tokens

speculative:                         # E3: EAGLE-3 self-draft (P10)
  enabled: true
  draft_params_fraction: 0.02
  halting_coupled_depth: true        # halting prob drives draft depth (A11)

h_block_long_context:                # E4: NSA option for the 64K+ fine-tune phase
  attention: full                    # full | nsa  (nsa only at long-context stage)

self_play:                           # E7: Absolute Zero flywheel (v3.1 lane)
  enabled: false                     # scaffolding lands with P10 MCP sandbox
  executor: mcp_sandbox
  propose_budget: 6                  # reasoning_budget for proposer/solver
  distill_budget: 2

normalization:
  type: subln                        # BitNet-style
  rms_norm_eps: 1.0e-6

teacher: Qwen/Qwen3.6-35B-A3B
teacher_logit_temperature: 2.0

context:
  native: 32768                      # trained natively (P3-P5 window)
  yarn_extended: 262144              # post-process extension
  experimental_target: 1048576       # 1M, P-late curriculum (see SUBQUADRATIC.md section 6)
