# AVA v3-Code — donor transplant configuration (the $0 coding pivot).
# Authoritative plan: docs/v3/CODE_PIVOT.md. Supersedes v3_student_arch.yaml's
# clean-slate dimensions; block design and edge portfolio carry over.

name: ava-v3-code
mission: coding specialist, <=4 GB VRAM, $0 training, free forever

donor:                            # SWAPPED 2026-07-02 (donor re-eval, REVIEW_2026-07.md section 10):
  model: Qwen/Qwen3.5-4B          # Apache 2.0, Feb 2026. LiveCodeBench v6 55.8,
  license: apache-2.0             # MMLU-Pro 79.1, GPQA-D 76.2 — out of the box.
  hidden_size: 2560               # NATIVE 3:1 Gated DeltaNet : Gated Attention hybrid
  num_layers: 32                  # -> 8 x [3 x GDN->FFN, 1 x GatedAttn->FFN]
  attention_layout: hybrid_gdn_3to1   # T1 LINEARIZATION ELIMINATED — donor ships it
  gdn_heads: {v: 32, qk: 16}
  attn_heads: {q: 16, kv: 4}
  context_native: 262144          # -> 1M extensible; reverses the 8K-native cut
  vocab_size: 248320              # Qwen3.5 tokenizer; tied embeddings
  tie_word_embeddings: true
  thinking_default: true          # traces carry <think> — handle in format contract
  mtp_heads: true                 # trained multi-token-prediction heads ship with donor
                                  # (unsloth/Qwen3.5-4B-MTP-GGUF; llama.cpp PR #22673,
                                  #  --spec-type draft-mtp, ~1.7x decode). GATE INVARIANT:
                                  #  every phase must preserve MTP heads or document loss.
  verify_at_c1: [ffn_intermediate_size, dense_vs_moe_ffn, vision_tower_droppable,
                 mtp_head_layout, llama_cpp_head_commit_pin]
  previous: Qwen/Qwen3-4B         # superseded — pre-dated Qwen3.5 family
  runners_up:
    - model: nvidia/Nemotron-3-Nano-4B   # Mamba-2 hybrid, MATH500 95.4, 262K ctx
      rejected_for: [non_apache_license, tokenizer_mismatch_with_teacher]
    - model: google/gemma-4-4b-moe
      rejected_for: [gemma_license]      # same ruling as RESEARCH_ROUND_6

teacher:                          # RESEARCH_ROUND_2.md section 3 — multi-teacher panel
  panel:
    - model: Qwen/Qwen3.6-27B     # Apache 2.0; SWE-bench Verified 77.2
      role: agentic_swe_primary
    - model: mistralai/Devstral-Small-2-24B-Instruct-2512  # Apache 2.0; SWE-bench V 68.0
      role: multifile_edit_toolnav
    - model: Qwen/Qwen3-4B        # donor as style anchor (low-conflict basics)
      role: style_anchor
    - dataset: nvidia_nemotron_agentic_traces  # OpenMDW; pre-generated, zero serving cost
      role: agentic_tool_patterns
  mode: trace_distillation        # text traces, NOT logit KL — no vocab coupling,
  conflict_protocol:              # binding, in order; never logit fusion
    - execution_filter            # only test-passing traces enter the pool
    - domain_routing              # primary teacher per task family
    - local_naturalness_selection # student-side stepwise trace scoring
    - single_format_contract      # analysis -> plan -> code -> self-check
  serving:                        # no terabyte cache, no rented cluster
    - kaggle_2xT4_int4
    - laptop_streaming_int4       # Exp5 loader, overnight generation

transplant:                       # CODE_PIVOT.md section 3
  t1_linearize:
    status: ELIMINATED_2026-07-02 # Qwen3.5-4B donor is already the 3:1 GDN hybrid.
    rationale: >                  # LoLCATs surgery, induction-probe keep-set, R2/R22
      Donor ships the target hybrid trained-in at 262K context with published
      quality. Converting GDN->Mamba-3 for the +1.8pp ICLR result would re-open
      the riskiest stage for marginal gain — rejected. SUBQUADRATIC.md's
      Mamba-3-vs-GDN debate resolves to: keep donor GDN.
    savings: {tokens: 80e6, risks_retired: [R2, R22_mostly], probe_machinery: kept_for_regression_checks}
  t2_moeify:
    status: DEMOTED_TO_V31_ABLATION   # REVIEW_2026-07 section 1: MoE breaks 4GB budget
    recipe: sparse_upcycling      # 2212.05055 + BitDistiller ternary QAT
    qat_recipe_candidates:        # 2026-07-09 research round (REVIEW section 13):
      - ternary_mamba_2606.18114  # grouped W1.58A16 QAT on SSM models — direct
                                  # prior art for ternary on the GDN hybrid
      - paretoq_2502.02631        # best sub-8B ternary scaling; candidate to
                                  # replace BitDistiller as the QAT recipe
    num_routed_experts: 32
    top_k: 4
    routed_intermediate: 1216     # ~9728/8; exact split fixed at C3
    shared_expert: full_donor_ffn_copy   # worst case = donor quality
    quant: ternary_group256       # exports stock TQ1_0/TQ2_0
    token_budget: 500e6
  t3_mount:                       # all zero-init = donor-identical at mount time
    hrm_refinement: true          # engine/hrm_core.py
    pkm_memory: true              # engine/pkm_memory.py — API/library memory
    convergence_aware_halting: true
  t4_specialize:
    token_budget: 900e6

context:
  native: 8192                    # $0 cut: was 32K; YaRN to 32-64K post-hoc
  yarn_extended: 65536
  long_context_lane: deferred     # repo-level work leans on agentic harness

data:                             # all redistributable; CODE_PIVOT.md section 4
  reasoning_sft: [nvidia/OpenCodeReasoning, nvidia/OpenCodeReasoning-2]
  pretrain_mix: the-stack-v2-permissive-subsets
  edit_sft: commitpackft
  instruct: self-oss-instruct
  teacher_traces: generated_weekly
  self_play: mcp_sandbox_verified
  agentic_synthetic: swe_playground          # RESEARCH_ROUND_3.md section 4
  objectives: [next_token, fim]   # FIM mandatory from C3 onward
  packing: repo_topological       # DeepSeek-Coder recipe; FIM after packing
  hygiene:                        # R21 — ships as a published report per phase
    dedup: minhash_lsh
    decontamination: [ngram_10, normalized_ast]
    against: all_eval_matrix_sets
    temporal_holdout: livecodebench_time_window

self_play:                        # E7 promoted to core (phase C6)
  enabled: true
  recipe: absolute_zero           # 2505.03335; stepwise rewards per ExecVerify
  executor: mcp_sandbox
  propose_budget: 6
  distill_budget: 2
  improvement_ladder: [S1_fix_own_code, S2_generate_tasks, S3_repair_pipeline, S4_curriculum_proposals]
  verifier_hardening:             # R20 — RESEARCH_ROUND_3.md section 5
    hidden_test_half: true
    mutation_smoke_min_kill: 0.30 # weaker test suites discarded
    property_based_templates: true
    soft_verification: sera_style # ranks among passers; D5 diff-minimality in reward
    feedback_agent: true          # SIA pattern: failures become critique data
  task_families:
    - function_level_azr
    - swe_playground_synthetic
    - perf_verifiable_speedup     # timed harness reward (kernels, hot loops)

training_recipe_extras:           # RESEARCH_ROUND_3.md section 6
  checkpoint_ema_last_k: 4        # soup before each gate eval; fabric stores them
  gkd_on_policy_lane:             # gated A14; Qwen-vocab teachers only
    enabled_at: C5_ablation
    teacher: Qwen/Qwen3.6-27B
    adopt_if: beats_trace_sft_at_equal_gpu_hours
  canon_layer_ablation: A13_50M_proxy_only

compute:                          # CODE_PIVOT.md section 6 — all free
  laptop: rtx_a2000_4gb_24x7
  kaggle: 2xT4_30h_per_week
  colab: T4_free_sessions
  checkpointing:                  # scripts/checkpoint_sync.py (tested offline)
    hub_repo: NAME0x0/AVA-v3-checkpoints   # private during training
    push_to_hub_every_minutes: 30
    resumable_shard_hours: 3
    optimizer_state: included
    rng_state: included
    auth: HF_TOKEN_env_only       # token never in code, configs, or git

demands:                          # docs/v3/INVENTION.md D1-D8 (gates there)
  cpu_only_decode_toks: 5         # D1: 4-core AVX2, no GPU
  calibration_ece_max: 0.15       # D2: self-estimated pass probability
  hallucinated_import_rate_max: 0.02
  air_gap_required: true          # D3
  explain_mode: first_class       # D4
  diff_minimality_median_max: 1.5 # D5
  energy_ledger: published_kwh    # D6
  reproducible_from_script: true  # D7
  nightly_self_maintenance: true  # D8

evals:                            # gates in CODE_PIVOT.md section 7
  matrix: [humaneval_plus, mbpp_plus, livecodebench, bigcodebench, multipl_e,
           cruxeval, canitedit, aider_polyglot, swebench_lite, swebench_verified]
  sanity_floors: {arc_easy: 75, mmlu: 45}
  baseline: donor_full_matrix_at_C1
