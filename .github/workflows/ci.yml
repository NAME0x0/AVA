name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and research extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,bench]

      - name: Ruff
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: MyPy
        run: mypy src tests

      - name: Pytest
        run: pytest -q

  cli-smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and research extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,bench]

      - name: Dry-run budget
        run: python -m ava.cli train dry-run configs/base.yaml

      - name: Registry smoke
        run: |
          python -m ava.cli benchmark registry --stage foundation
          python -m ava.cli benchmark registry --modality vision
