name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTEST_ADDOPTS: "--basetemp=.pytest-tmp"
  TOKENIZERS_PARALLELISM: "false"

jobs:
  quality:
    name: Quality / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,bench]

      - name: Ruff
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: MyPy
        run: mypy src tests

  research-core-linux:
    name: Research Core / Linux
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package with train and benchmark extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,train,bench]

      - name: Pytest
        run: pytest -q

      - name: CLI smoke
        run: |
          python -m ava.cli train dry-run configs/base.yaml
          python -m ava.cli benchmark registry --stage foundation
          python -m ava.cli benchmark registry --modality vision

  windows-smoke:
    name: Windows Smoke / Python 3.13
    runs-on: windows-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install package with train and benchmark extras
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,train,bench]

      - name: Targeted pytest smoke
        shell: pwsh
        run: |
          pytest tests/test_env.py tests/test_external_benchmarks.py tests/test_retrieval.py -q

      - name: CLI smoke
        shell: pwsh
        run: |
          python -m ava.cli benchmark registry --stage foundation
          python -m ava.cli benchmark registry --modality vision
